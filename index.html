<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connection Master v2</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --panel-3: #273244;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #374151;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --white: #ffffff;
      --shadow: 0 10px 25px rgba(0,0,0,.32);
      --radius: 14px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 310px minmax(500px, 1fr) 380px;
      grid-template-rows: 64px 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / 4;
      background: linear-gradient(90deg, #111827, #0f172a 40%, #111827);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 290px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 25%, #38bdf8, #2563eb 50%, #111827 100%);
      box-shadow: 0 0 24px rgba(56,189,248,.28);
      font-weight: 900;
      letter-spacing: -.04em;
    }

    h1 {
      font-size: 18px;
      line-height: 1.1;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .field-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    input, select, textarea {
      color: var(--text);
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(56,189,248,.15);
    }

    .small-input { width: 74px; }
    .medium-select { width: 150px; }

    button {
      background: #1e293b;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 8px 11px;
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover {
      background: #273449;
      border-color: #475569;
    }

    button.primary {
      background: #0ea5e9;
      border-color: #38bdf8;
      color: #03111c;
      font-weight: 800;
    }

    button.danger:hover {
      border-color: var(--red);
      color: #fecaca;
    }

    aside, .right-panel {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .right-panel {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .panel-header {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0 0 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #cbd5e1;
    }

    .search {
      width: 100%;
    }

    .toolbox {
      padding: 12px 14px 18px;
      overflow: auto;
    }

    .category {
      margin: 12px 0 8px;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 800;
    }

    .part-card {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 10px;
      background: #0b1220;
      border: 1px solid #263244;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: grab;
      user-select: none;
    }

    .part-card:hover {
      border-color: #475569;
      background: #101827;
    }

    .part-card:active { cursor: grabbing; }

    .part-icon {
      width: 82px;
      height: 56px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 25% 20%, rgba(56,189,248,.18), rgba(15,23,42,.92) 55%);
      border: 1px solid #243044;
      color: #7dd3fc;
      overflow: hidden;
    }

    .part-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .svg-stroke { stroke: #93c5fd; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .svg-stroke-thin { stroke: #bfdbfe; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .svg-metal { fill: #64748b; stroke: #cbd5e1; stroke-width: 2; }
    .svg-dark { fill: #1e293b; stroke: #94a3b8; stroke-width: 2; }
    .svg-fill-blue { fill: rgba(56,189,248,.22); stroke: #7dd3fc; stroke-width: 2; }
    .svg-fill-yellow { fill: rgba(245,158,11,.22); stroke: #fde68a; stroke-width: 2; }
    .svg-fill-green { fill: rgba(34,197,94,.2); stroke: #86efac; stroke-width: 2; }
    .svg-thread { stroke: #cbd5e1; stroke-width: 1.6; stroke-linecap: round; }

    .part-name {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 3px;
      color: #f8fafc;
    }

    .part-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      background-color: #0b1120;
      background-image:
        linear-gradient(rgba(148, 163, 184, .09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, .09) 1px, transparent 1px);
      background-size: 24px 24px;
      min-width: 0;
      min-height: 0;
    }

    .canvas-toolbar {
      position: absolute;
      z-index: 30;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(15, 23, 42, .88);
      backdrop-filter: blur(12px);
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .hint {
      color: #94a3b8;
      font-size: 12px;
      padding-left: 4px;
    }

    #edgeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    #nodeLayer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .node {
      position: absolute;
      width: 196px;
      min-height: 82px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: var(--shadow);
      user-select: none;
      cursor: move;
      overflow: visible;
    }

    .node.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(56,189,248,.18), var(--shadow);
    }

    .node.invalid {
      border-color: rgba(239,68,68,.75);
    }

    .node.warn {
      border-color: rgba(245,158,11,.75);
    }

    .node-head {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #263244;
    }

    .node-icon {
      width: 32px;
      height: 26px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #172033;
      color: #7dd3fc;
      font-weight: 900;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid #243044;
    }

    .node-title {
      font-size: 12px;
      font-weight: 900;
      line-height: 1.15;
      color: #f8fafc;
    }

    .node-subtitle {
      color: #9ca3af;
      font-size: 10px;
      margin-top: 2px;
    }

    .node-body {
      padding: 8px 12px 11px;
      color: #cbd5e1;
      font-size: 11px;
      line-height: 1.4;
    }

    .node-visual {
      height: 74px;
      border-radius: 13px;
      background: radial-gradient(circle at 35% 20%, rgba(56,189,248,.15), rgba(15,23,42,.92) 60%);
      border: 1px solid #243044;
      display: grid;
      place-items: center;
      margin-bottom: 7px;
      overflow: hidden;
    }

    .node-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .visual-label {
      position: absolute;
      top: 47px;
      right: 10px;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #64748b;
      text-transform: uppercase;
      pointer-events: none;
    }

    .node-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 3px 7px;
      margin-top: 4px;
      background: #0b1220;
      color: #cbd5e1;
      border: 1px solid #263244;
      font-size: 10px;
    }

    .port {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: #020617;
      border: 2px solid #94a3b8;
      cursor: crosshair;
      z-index: 20;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
    }

    .port::after {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 99px;
      background: #94a3b8;
    }

    .port:hover, .port.pending {
      border-color: var(--blue);
      box-shadow: 0 0 0 5px rgba(56,189,248,.16);
    }

    .port.left { left: 0; }
    .port.right { left: 100%; }
    .port.top { top: 0; }
    .port.bottom { top: 100%; }

    .port-label {
      position: absolute;
      color: #94a3b8;
      font-size: 9px;
      white-space: nowrap;
      pointer-events: none;
      top: 50%;
      transform: translateY(-50%);
    }

    .port.left .port-label { right: 18px; }
    .port.right .port-label { left: 18px; }

    .edge-hit {
      stroke: transparent;
      stroke-width: 14;
      pointer-events: stroke;
      cursor: pointer;
    }

    .edge-line {
      stroke-width: 4;
      fill: none;
      pointer-events: none;
    }

    .edge-line.valid { stroke: var(--green); }
    .edge-line.warn { stroke: var(--yellow); stroke-dasharray: 8 5; }
    .edge-line.invalid { stroke: var(--red); stroke-dasharray: 4 5; }
    .edge-line.selected { stroke-width: 6; filter: drop-shadow(0 0 6px rgba(56,189,248,.6)); }

    .right-scroll {
      overflow: auto;
      padding: 14px;
    }

    .card {
      background: #0b1220;
      border: 1px solid #263244;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .kv {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 6px 10px;
      font-size: 12px;
      color: #cbd5e1;
    }

    .kv .key { color: #94a3b8; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .status-valid { color: #bbf7d0; background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.35); }
    .status-warn { color: #fde68a; background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); }
    .status-invalid { color: #fecaca; background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); }
    .status-draft { color: #bae6fd; background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.35); }

    .connection-list, .bom-list, .step-list, .warning-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    .connection-item, .bom-item, .step-item, .warning-item {
      border: 1px solid #263244;
      background: #101827;
      border-radius: 11px;
      padding: 9px;
      font-size: 12px;
      line-height: 1.35;
    }

    .connection-item.invalid, .warning-item.invalid { border-color: rgba(239,68,68,.38); }
    .connection-item.warn, .warning-item.warn { border-color: rgba(245,158,11,.38); }
    .connection-item.valid { border-color: rgba(34,197,94,.32); }

    .muted {
      color: var(--muted);
    }

    .property-grid {
      display: grid;
      gap: 9px;
    }

    .property-grid label {
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: #94a3b8;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .empty-state {
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.45;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(15,23,42,.95);
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 100;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 18px;
      width: min(960px, 96vw);
      max-height: 86vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 22px 70px rgba(0,0,0,.55);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #334155;
    }

    .modal-body {
      padding: 16px;
      overflow: auto;
    }

    .report h2, .report h3 { margin-bottom: 8px; }
    .report table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0 18px; }
    .report th, .report td { border: 1px solid #334155; padding: 8px; text-align: left; vertical-align: top; }
    .report th { background: #111827; }
    .report code { background: #111827; padding: 2px 5px; border-radius: 5px; }

    @media print {
      body { overflow: visible; background: white; color: black; }
      .app, .modal-head button, .canvas-toolbar, header, aside, .right-panel { display: none !important; }
      .modal-backdrop, .modal, .modal-body { display: block !important; position: static; background: white; color: black; max-height: none; overflow: visible; border: 0; box-shadow: none; width: auto; padding: 0; }
      .modal-head { display: none; }
      .report table th, .report table td { border-color: #444; }
      .report th { background: #eee; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-mark">CM</div>
        <div>
          <h1>Connection Master <span class="muted">v2</span></h1>
          <div class="subtitle">Validated GC pneumatic / gas / sample line builder</div>
        </div>
      </div>
      <div class="top-controls">
        <label class="field-inline">Gas
          <select id="gasSelect" class="medium-select">
            <option value="Helium">Helium</option>
            <option value="Nitrogen">Nitrogen</option>
            <option value="Hydrogen">Hydrogen</option>
            <option value="Air">Air</option>
            <option value="Calibration Gas">Calibration Gas</option>
            <option value="Sample Gas">Sample Gas</option>
            <option value="Methane">Methane</option>
            <option value="Propane">Propane</option>
          </select>
        </label>
        <label class="field-inline">Service
          <select id="serviceSelect" class="medium-select">
            <option value="Carrier Gas">Carrier Gas</option>
            <option value="FID Fuel Gas">FID Fuel Gas</option>
            <option value="FID Air">FID Air</option>
            <option value="Calibration Standard">Calibration Standard</option>
            <option value="Sample Transfer">Sample Transfer</option>
            <option value="Pneumatic Control">Pneumatic Control</option>
            <option value="Vent">Vent</option>
          </select>
        </label>
        <label class="field-inline">Pressure psig
          <input id="pressureInput" class="small-input" type="number" value="100" min="0" max="5000" />
        </label>
        <button id="saveBtn">Save</button>
        <button id="loadBtn">Load</button>
        <button id="exportBtn">Export JSON</button>
        <button id="reportBtn" class="primary">Build Sheet</button>
      </div>
    </header>

    <aside>
      <div class="panel-header">
        <div class="panel-title">Toolbox</div>
        <input id="toolSearch" class="search" placeholder="Search parts, size, type..." />
      </div>
      <div id="toolbox" class="toolbox"></div>
    </aside>

    <main id="canvasWrap" class="canvas-wrap">
      <div class="canvas-toolbar">
        <button id="sampleBtn">Load Sample Build</button>
        <button id="clearBtn" class="danger">Clear</button>
        <button id="deleteBtn" class="danger">Delete Selected</button>
        <span id="connectHint" class="hint">Click a port, then another port to connect.</span>
      </div>
      <svg id="edgeLayer"></svg>
      <div id="nodeLayer"></div>
      <div id="toast" class="toast"></div>
    </main>

    <section class="right-panel">
      <div class="panel-header">
        <div class="panel-title">Inspector</div>
        <div id="systemStatus" class="status-pill status-draft">Draft</div>
      </div>
      <div class="right-scroll">
        <div id="selectedPanel" class="card"></div>
        <div class="card">
          <h3>Validation</h3>
          <div id="validationPanel"></div>
        </div>
        <div class="card">
          <h3>Bill of Materials</h3>
          <div id="bomPanel"></div>
        </div>
        <div class="card">
          <h3>Connection Steps</h3>
          <div id="stepsPanel"></div>
        </div>
      </div>
    </section>
  </div>

  <div id="reportModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head">
        <strong>Connection Master Build Sheet</strong>
        <div class="button-row" style="margin-top:0">
          <button id="printBtn">Print / Save PDF</button>
          <button id="closeReportBtn">Close</button>
        </div>
      </div>
      <div id="reportBody" class="modal-body report"></div>
    </div>
  </div>

  <script>
    const PART_LIBRARY = [
      {
        id: 'source-he-cyl', category: 'Gas Sources', icon: 'CYL', name: 'Helium Cylinder / Source', manufacturer: 'Generic', partNumber: 'SOURCE-HE-CGA580', material: 'Steel cylinder', maxPressure: 2200, gases: ['Helium'], notes: 'High-pressure gas source. Requires compatible regulator.',
        ports: [{ id: 'out', label: 'CGA-580', type: 'CGA', size: 'CGA-580', gender: 'female', side: 'right' }]
      },
      {
        id: 'source-cal-gas', category: 'Gas Sources', icon: 'STD', name: 'Calibration Gas Cylinder', manufacturer: 'Generic', partNumber: 'SOURCE-CAL-CGA350', material: 'Steel cylinder', maxPressure: 2200, gases: ['Calibration Gas', 'Sample Gas', 'Methane', 'Propane'], notes: 'Calibration gas source. Confirm CGA connection before use.',
        ports: [{ id: 'out', label: 'CGA-350', type: 'CGA', size: 'CGA-350', gender: 'female', side: 'right' }]
      },
      {
        id: 'reg-2stage-cga580', category: 'Pressure Control', icon: 'REG', name: 'Two-Stage Regulator CGA-580', manufacturer: 'Approved Vendor', partNumber: 'REG-CGA580-0250', material: 'Brass / SS wetted path', maxPressure: 3000, gases: ['Helium', 'Nitrogen', 'Air'], notes: 'Use for inert carrier gases. Outlet shown as 1/4 in FNPT.',
        ports: [
          { id: 'in', label: 'CGA-580', type: 'CGA', size: 'CGA-580', gender: 'male', side: 'left' },
          { id: 'out', label: '1/4 FNPT', type: 'NPT', size: '1/4 in', gender: 'female', thread: 'NPT', side: 'right' }
        ]
      },
      {
        id: 'reg-2stage-cga350', category: 'Pressure Control', icon: 'REG', name: 'Two-Stage Regulator CGA-350', manufacturer: 'Approved Vendor', partNumber: 'REG-CGA350-0250', material: 'Brass / SS wetted path', maxPressure: 3000, gases: ['Calibration Gas', 'Methane', 'Propane', 'Sample Gas'], notes: 'Common fuel/calibration gas style placeholder. Verify actual cylinder CGA.',
        ports: [
          { id: 'in', label: 'CGA-350', type: 'CGA', size: 'CGA-350', gender: 'male', side: 'left' },
          { id: 'out', label: '1/4 FNPT', type: 'NPT', size: '1/4 in', gender: 'female', thread: 'NPT', side: 'right' }
        ]
      },
      {
        id: 'adapter-nptm-to-tube14', category: 'Adapters', icon: 'ADP', name: '1/4 MNPT x 1/4 Tube Adapter', manufacturer: 'Swagelok-style', partNumber: 'SS-400-1-4', material: '316 SS', maxPressure: 2500, gases: ['Helium', 'Nitrogen', 'Hydrogen', 'Air', 'Calibration Gas', 'Sample Gas', 'Methane', 'Propane'], notes: 'Thread sealant required on NPT side only. Tube side requires ferrules.',
        ports: [

      const id = part.id.toLowerCase();
      const name = part.name.toLowerCase();
      const category = part.category.toLowerCase();
      if (id.includes('source') || name.includes('cylinder')) return 'cylinder';
      if (name.includes('regulator')) return 'regulator';
      if (category.includes('tubing')) return 'tubing';
      if (name.includes('needle valve')) return 'needleValve';
      if (category.includes('valves')) return 'valve';
      if (name.includes('reducer')) return 'reducer';
      if (category.includes('traps') || name.includes('trap') || name.includes('filter')) return 'trap';
      if (category.includes('quick')) return name.includes('socket') ? 'quickSocket' : 'quickPlug';
      if (category.includes('gc instrument')) return 'gcPort';
      if (category.includes('caps')) return 'cap';
      if (category.includes('adapters')) return 'adapter';
      return 'generic';

    function renderToolbox() {
      const q = toolSearchEl.value.trim().toLowerCase();
      const filtered = PART_LIBRARY.filter(p => {
        const hay = [p.name, p.category, p.manufacturer, p.partNumber, p.material, p.notes, ...p.ports.map(port => `${port.type} ${port.size} ${port.gender} ${port.label}`)].join(' ').toLowerCase();
        return !q || hay.includes(q);
      });

      const groups = {};
      filtered.forEach(p => {
        groups[p.category] ||= [];
        groups[p.category].push(p);
      });

      toolboxEl.innerHTML = '';
      Object.keys(groups).sort().forEach(cat => {
        const catEl = document.createElement('div');
        catEl.className = 'category';
        catEl.textContent = cat;
        toolboxEl.appendChild(catEl);

        groups[cat].forEach(part => {
          const el = document.createElement('div');
          el.className = 'part-card';
          el.draggable = true;
          el.dataset.partId = part.id;
          el.innerHTML = `
            <div class="part-icon">${partDrawing(part, 'tool')}</div>
            <div>
              <div class="part-name">${escapeHtml(part.name)}</div>
              <div class="part-meta">${escapeHtml(part.partNumber)}<br>${part.ports.map(port => `${port.label}`).join(' • ')}</div>
            </div>
          `;
          el.addEventListener('dragstart', ev => {
            ev.dataTransfer.setData('text/plain', part.id);
            ev.dataTransfer.effectAllowed = 'copy';
          });
          toolboxEl.appendChild(el);
        });
      });
    }

    function addNode(partId, x, y, custom = {}) {
      const part = getPart(partId);
      if (!part) return null;
      const node = {
        id: custom.id || `N${state.nodeSeq++}`,
        partId,
        x,
        y,
        label: custom.label || part.name,
        lengthFt: custom.lengthFt ?? part.defaultLengthFt ?? null,
        notes: custom.notes || '',
        tag: custom.tag || ''
      };
      state.nodes.push(node);
      renderAll();
      return node;
    }

    function portPosition(node, port) {
      const width = NODE_WIDTH;
      const height = nodeHeight(node);
      const sidePorts = getNodePart(node).ports.filter(p => p.side === port.side);
      const index = sidePorts.findIndex(p => p.id === port.id);
      const count = sidePorts.length;
      const ySlot = height * ((index + 1) / (count + 1));
      const xSlot = width * ((index + 1) / (count + 1));

      if (port.side === 'left') return { x: node.x, y: node.y + ySlot };
      if (port.side === 'right') return { x: node.x + width, y: node.y + ySlot };
      if (port.side === 'top') return { x: node.x + xSlot, y: node.y };
      if (port.side === 'bottom') return { x: node.x + xSlot, y: node.y + height };
      return { x: node.x + width, y: node.y + height / 2 };
    }

        const el = document.createElement('div');
        el.className = `node ${state.selected?.type === 'node' && state.selected.id === node.id ? 'selected' : ''} ${nodeStatus}`;
        el.style.left = `${node.x}px`;
        el.style.top = `${node.y}px`;
        el.style.height = `${nodeHeight(node)}px`;
        el.dataset.nodeId = node.id;
        el.innerHTML = `

            <div class="node-icon">${partDrawing(part, 'micro')}</div>
            <div>
              <div class="node-title">${escapeHtml(node.label)}</div>

            </div>
          </div>

              ${node.lengthFt ? `<span class="node-badge">${node.lengthFt} ft</span>` : ''}
            </div>
          </div>
        `;

        el.addEventListener('pointerdown', ev => {
          if (ev.target.classList.contains('port') || ev.target.closest('.port')) return;
          selectItem({ type: 'node', id: node.id });
          startNodeDrag(ev, node.id);
        });

        const grouped = {};
        part.ports.forEach(port => grouped[port.side] = (grouped[port.side] || 0) + 1);
        const sideCounters = {};

        part.ports.forEach(port => {
          sideCounters[port.side] = (sideCounters[port.side] || 0) + 1;
          const count = grouped[port.side];
          const index = sideCounters[port.side];
          const portEl = document.createElement('div');
          portEl.className = `port ${port.side} ${state.pendingPort?.nodeId === node.id && state.pendingPort?.portId === port.id ? 'pending' : ''}`;
          portEl.dataset.nodeId = node.id;
          portEl.dataset.portId = port.id;

          if (port.side === 'left' || port.side === 'right') {
            portEl.style.top = `${100 * index / (count + 1)}%`;
          } else {
            portEl.style.left = `${100 * index / (count + 1)}%`;
          }

          portEl.title = `${port.label} | ${port.type} | ${port.size} | ${port.gender}`;
          portEl.innerHTML = `<span class="port-label">${escapeHtml(port.label)}</span>`;
          portEl.addEventListener('pointerdown', ev => ev.stopPropagation());
          portEl.addEventListener('click', ev => {
            ev.stopPropagation();
            handlePortClick(node.id, port.id);
          });
          el.appendChild(portEl);
        });

        nodeLayer.appendChild(el);
      });
    }

    function renderEdges() {
      edgeLayer.innerHTML = '';
      const svgRect = edgeLayer.getBoundingClientRect();
      edgeLayer.setAttribute('viewBox', `0 0 ${svgRect.width} ${svgRect.height}`);

      state.edges.forEach(edge => {
        const fromNode = getNode(edge.from.nodeId);
        const toNode = getNode(edge.to.nodeId);
        const fromPort = getPort(edge.from.nodeId, edge.from.portId);
        const toPort = getPort(edge.to.nodeId, edge.to.portId);
        if (!fromNode || !toNode || !fromPort || !toPort) return;
        const a = portPosition(fromNode, fromPort);
        const b = portPosition(toNode, toPort);
        const validation = validateConnection(edge.from, edge.to);
        edge.validation = validation;
        const statusClass = validation.status;
        const selected = state.selected?.type === 'edge' && state.selected.id === edge.id ? 'selected' : '';
        const dx = Math.max(60, Math.abs(b.x - a.x) / 2);
        const c1x = a.x + (a.x <= b.x ? dx : -dx);
        const c2x = b.x - (a.x <= b.x ? dx : -dx);
        const d = `M ${a.x} ${a.y} C ${c1x} ${a.y}, ${c2x} ${b.y}, ${b.x} ${b.y}`;

        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', d);
        hit.setAttribute('class', 'edge-hit');
        hit.style.pointerEvents = 'stroke';
        hit.addEventListener('click', () => selectItem({ type: 'edge', id: edge.id }));

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('d', d);
        line.setAttribute('class', `edge-line ${statusClass} ${selected}`);

        group.appendChild(hit);
        group.appendChild(line);
        edgeLayer.appendChild(group);
      });
    }

    function renderPanels() {
      renderSelectedPanel();
      renderValidationPanel();
      renderBomPanel();
      renderStepsPanel();
      renderSystemStatus();
    }

    function renderAll() {
      renderNodes();
      renderEdges();
      renderPanels();
    }

    function renderSelectedPanel() {
      if (!state.selected) {
        selectedPanel.innerHTML = `<h3>Selected Item</h3><div class="empty-state">Select a part or connection to inspect and edit it.</div>`;
        return;
      }

      if (state.selected.type === 'node') {
        const node = getNode(state.selected.id);
        if (!node) return;
        const part = getNodePart(node);
        selectedPanel.innerHTML = `
          <h3>Selected Part</h3>
          <div class="property-grid">
            <label>Label <input id="propLabel" value="${escapeAttr(node.label)}" /></label>
            ${node.lengthFt !== null ? `<label>Tubing Length, ft <input id="propLength" type="number" min="0" step="0.1" value="${node.lengthFt}" /></label>` : ''}
            <label>Asset / Tag <input id="propTag" value="${escapeAttr(node.tag)}" placeholder="GC-2014, Cylinder 1, etc." /></label>
            <label>Notes <textarea id="propNotes" placeholder="Assembly notes...">${escapeHtml(node.notes)}</textarea></label>
          </div>
          <div class="button-row"><button id="applyPropsBtn">Apply</button></div>
          <hr style="border-color:#263244;border-style:solid;border-width:1px 0 0;margin:12px 0">
          <div class="kv">
            <div class="key">Part #</div><div>${escapeHtml(part.partNumber)}</div>
            <div class="key">Maker</div><div>${escapeHtml(part.manufacturer)}</div>
            <div class="key">Material</div><div>${escapeHtml(part.material)}</div>
            <div class="key">Max psig</div><div>${part.maxPressure}</div>
            <div class="key">Ports</div><div>${part.ports.map(p => `${p.label} (${p.type}, ${p.gender})`).join('<br>')}</div>
            <div class="key">Notes</div><div>${escapeHtml(part.notes)}</div>
          </div>
        `;
        document.getElementById('applyPropsBtn').addEventListener('click', () => {
          node.label = document.getElementById('propLabel').value.trim() || part.name;
          if (node.lengthFt !== null && document.getElementById('propLength')) node.lengthFt = Number(document.getElementById('propLength').value || 0);
          node.tag = document.getElementById('propTag').value.trim();
          node.notes = document.getElementById('propNotes').value.trim();
          renderAll();
          toast('Part updated.');
        });
        return;
      }

      if (state.selected.type === 'edge') {
        const edge = state.edges.find(e => e.id === state.selected.id);
        if (!edge) return;
        const fromNode = getNode(edge.from.nodeId);
        const toNode = getNode(edge.to.nodeId);
        const fromPort = getPort(edge.from.nodeId, edge.from.portId);
        const toPort = getPort(edge.to.nodeId, edge.to.portId);
        const validation = validateConnection(edge.from, edge.to);
        selectedPanel.innerHTML = `
          <h3>Selected Connection</h3>
          <div class="kv">
            <div class="key">From</div><div>${escapeHtml(fromNode?.label || '')} / ${escapeHtml(fromPort?.label || '')}</div>
            <div class="key">To</div><div>${escapeHtml(toNode?.label || '')} / ${escapeHtml(toPort?.label || '')}</div>
            <div class="key">Status</div><div>${statusPill(validation.status, validation.title)}</div>
            <div class="key">Details</div><div>${validation.messages.map(escapeHtml).join('<br>')}</div>
          </div>
        `;
      }
    }

    function renderValidationPanel() {
      if (!state.nodes.length) {
        validationPanel.innerHTML = `<div class="empty-state">No assembly yet. Drag parts from the toolbox onto the canvas.</div>`;
        return;
      }
      const issues = getAllIssues();
      if (!issues.length) {
        validationPanel.innerHTML = `${statusPill('valid', 'Assembly valid')}<div class="empty-state" style="margin-top:8px">No current validation issues. Complete physical verification and leak check before use.</div>`;
        return;
      }
      validationPanel.innerHTML = `<ul class="warning-list">${issues.map(i => `<li class="warning-item ${i.status}"><strong>${escapeHtml(i.title)}</strong><br><span class="muted">${escapeHtml(i.message)}</span></li>`).join('')}</ul>`;
    }

    function renderBomPanel() {
      const bom = getBOM();
      if (!bom.length) {
        bomPanel.innerHTML = `<div class="empty-state">The bill of materials will appear as parts are added.</div>`;
        return;
      }
      bomPanel.innerHTML = `<ul class="bom-list">${bom.map(item => `<li class="bom-item"><strong>${item.qty}</strong> × ${escapeHtml(item.name)}<br><span class="muted">${escapeHtml(item.partNumber)} — ${escapeHtml(item.manufacturer)}${item.lengthFt ? ` — ${item.lengthFt} ft total` : ''}</span></li>`).join('')}</ul>`;
    }

    function renderStepsPanel() {
      if (!state.edges.length) {
        stepsPanel.innerHTML = `<div class="empty-state">Connection steps will appear after parts are connected.</div>`;
        return;
      }
      const steps = getConnectionSteps();
      stepsPanel.innerHTML = `<ol class="step-list">${steps.map(s => `<li class="step-item"><strong>${s.index}. ${escapeHtml(s.title)}</strong><br><span class="muted">${escapeHtml(s.detail)}</span><br>${statusPill(s.status, s.statusTitle)}</li>`).join('')}</ol>`;
    }

    function renderSystemStatus() {
      const issues = getAllIssues();
      const invalid = issues.some(i => i.status === 'invalid');
      const warn = issues.some(i => i.status === 'warn');
      systemStatus.className = 'status-pill ' + (invalid ? 'status-invalid' : warn ? 'status-warn' : state.nodes.length ? 'status-valid' : 'status-draft');
      systemStatus.textContent = invalid ? 'Blocked' : warn ? 'Review Required' : state.nodes.length ? 'Valid Draft' : 'Draft';
    }

    function validateConnection(a, b) {
      const nodeA = getNode(a.nodeId);
      const nodeB = getNode(b.nodeId);
      const portA = getPort(a.nodeId, a.portId);
      const portB = getPort(b.nodeId, b.portId);
      const partA = nodeA ? getNodePart(nodeA) : null;
      const partB = nodeB ? getNodePart(nodeB) : null;
      const messages = [];
      const warnings = [];

      if (!nodeA || !nodeB || !portA || !portB || !partA || !partB) return { status: 'invalid', title: 'Missing object', messages: ['A node or port no longer exists.'] };
      if (a.nodeId === b.nodeId) return { status: 'invalid', title: 'Same-part connection', messages: ['A part cannot connect to itself.'] };

      if (!typesCompatible(portA, portB)) messages.push(`Port types do not mate: ${portA.type} to ${portB.type}.`);
      if (!sizesCompatible(portA, portB)) messages.push(`Size mismatch: ${portA.size || 'none'} to ${portB.size || 'none'}.`);
      if (!gendersCompatible(portA, portB)) messages.push(`Gender/interface mismatch: ${portA.gender} to ${portB.gender}.`);
      if (!threadCompatible(portA, portB)) messages.push(`Thread standard mismatch: ${portA.thread || 'none'} to ${portB.thread || 'none'}.`);

      const minPressure = Math.min(partA.maxPressure || Infinity, partB.maxPressure || Infinity);
      if (Number(state.pressure) > minPressure) messages.push(`Operating pressure ${state.pressure} psig exceeds the lowest connected part rating of ${minPressure} psig.`);

      if (!partA.gases.includes(state.gas)) warnings.push(`${partA.name} is not approved in this library for ${state.gas}.`);
      if (!partB.gases.includes(state.gas)) warnings.push(`${partB.name} is not approved in this library for ${state.gas}.`);

      if ((portA.sealant === 'required' || portB.sealant === 'required') && (portA.type === 'NPT' || portB.type === 'NPT')) {
        warnings.push('NPT side requires approved thread sealant/tape per SOP. Keep sealant out of flow path.');
      }
      if (portA.ferrule || portB.ferrule || portA.type.includes('tube') || portB.type.includes('tube')) {
        warnings.push('Compression/tube connection: verify clean square cut, deburr, correct ferrules, and gauge/inspection where applicable.');
      }

      if (messages.length) return { status: 'invalid', title: 'Blocked connection', messages: messages.concat(warnings) };
      if (warnings.length) return { status: 'warn', title: 'Allowed with verification', messages: warnings };
      return { status: 'valid', title: 'Allowed connection', messages: ['Connection attributes are compatible.'] };
    }

    function typesCompatible(a, b) {
      if (a.type === b.type) return true;
      const pair = [a.type, b.type].sort().join('|');
      return [
        'tube_end|tube_receiver'
      ].includes(pair);
    }

    function sizesCompatible(a, b) {
      return !a.size || !b.size || a.size === b.size;
    }

    function gendersCompatible(a, b) {
      const pair = [a.gender, b.gender].sort().join('|');
      return [
        'female|male',
        'receiver|tube',
        'plug|socket',
        'bidirectional|bidirectional',
        'none|none'
      ].includes(pair);
    }

    function threadCompatible(a, b) {
      if (a.type !== 'NPT' && b.type !== 'NPT') return true;
      return a.thread && b.thread && a.thread === b.thread;
    }

    function getAllIssues() {
      const issues = [];
      const connectedPorts = new Set();
      state.edges.forEach(edge => {
        connectedPorts.add(`${edge.from.nodeId}:${edge.from.portId}`);
        connectedPorts.add(`${edge.to.nodeId}:${edge.to.portId}`);
        const v = validateConnection(edge.from, edge.to);
        if (v.status !== 'valid') {
          const fromNode = getNode(edge.from.nodeId);
          const toNode = getNode(edge.to.nodeId);
          issues.push({
            status: v.status,
            title: `${v.title}: ${fromNode?.label || edge.from.nodeId} → ${toNode?.label || edge.to.nodeId}`,
            message: v.messages.join(' ')
          });
        }
      });

      state.nodes.forEach(node => {
        const part = getNodePart(node);
        if (!part.gases.includes(state.gas)) {
          issues.push({ status: 'warn', title: 'Gas compatibility review', message: `${part.name} is not approved in this library for ${state.gas}.` });
        }
        if (Number(state.pressure) > part.maxPressure) {
          issues.push({ status: 'invalid', title: 'Pressure rating exceeded', message: `${part.name} max rating ${part.maxPressure} psig is below current operating pressure ${state.pressure} psig.` });
        }
        part.ports.forEach(port => {
          const key = `${node.id}:${port.id}`;
          if (!connectedPorts.has(key) && !part.category.includes('Caps')) {
            issues.push({ status: 'warn', title: 'Open port', message: `${node.label} has an unconnected port: ${port.label}. Cap, connect, or document as intentionally open/vented.` });
          }
        });
      });

      const hasSource = state.nodes.some(n => getNodePart(n).category === 'Gas Sources');
      const hasRegulator = state.nodes.some(n => getNodePart(n).category === 'Pressure Control' && getNodePart(n).name.toLowerCase().includes('regulator'));
      const hasGC = state.nodes.some(n => getNodePart(n).category === 'GC Instrument Ports');
      if (hasSource && !hasRegulator) issues.push({ status: 'invalid', title: 'Missing regulator', message: 'A cylinder/source is present without a regulator in the assembly.' });
      if (state.service.includes('Carrier') && !hasGC) issues.push({ status: 'warn', title: 'Missing instrument endpoint', message: 'Carrier gas service should terminate at a GC carrier gas inlet or approved endpoint.' });

      return issues;
    }

    function nodeConnectionStatus(nodeId) {
      let invalid = false;
      let warn = false;
      state.edges.filter(e => e.from.nodeId === nodeId || e.to.nodeId === nodeId).forEach(e => {
        const v = validateConnection(e.from, e.to);
        if (v.status === 'invalid') invalid = true;
        if (v.status === 'warn') warn = true;
      });
      return invalid ? 'invalid' : warn ? 'warn' : '';
    }

    function handlePortClick(nodeId, portId) {
      if (!state.pendingPort) {
        state.pendingPort = { nodeId, portId };
        renderNodes();
        toast('First port selected. Click a second port to connect.');
        return;
      }
      const first = state.pendingPort;
      const second = { nodeId, portId };
      state.pendingPort = null;
      if (first.nodeId === second.nodeId && first.portId === second.portId) {
        renderAll();
        toast('Connection cancelled.');
        return;
      }
      createEdge(first, second);
    }

    function createEdge(from, to) {
      const duplicate = state.edges.some(e =>
        (e.from.nodeId === from.nodeId && e.from.portId === from.portId && e.to.nodeId === to.nodeId && e.to.portId === to.portId) ||
        (e.from.nodeId === to.nodeId && e.from.portId === to.portId && e.to.nodeId === from.nodeId && e.to.portId === from.portId)
      );
      if (duplicate) {
        toast('That connection already exists.');
        renderAll();
        return;
      }
      const edge = { id: `E${state.edgeSeq++}`, from, to, validation: null };
      edge.validation = validateConnection(from, to);
      state.edges.push(edge);
      selectItem({ type: 'edge', id: edge.id });
      renderAll();
      toast(edge.validation.status === 'invalid' ? 'Connection created but blocked by validation.' : 'Connection created.');
    }

    function startNodeDrag(ev, nodeId) {
      const node = getNode(nodeId);
      const rect = canvasWrap.getBoundingClientRect();
      state.drag = {
        nodeId,
        offsetX: ev.clientX - rect.left - node.x,
        offsetY: ev.clientY - rect.top - node.y
      };
      ev.currentTarget.setPointerCapture?.(ev.pointerId);
    }

    window.addEventListener('pointermove', ev => {
      if (!state.drag) return;
      const rect = canvasWrap.getBoundingClientRect();
      const node = getNode(state.drag.nodeId);
      if (!node) return;
      const grid = 12;
      node.x = Math.max(8, Math.round((ev.clientX - rect.left - state.drag.offsetX) / grid) * grid);
      node.y = Math.max(64, Math.round((ev.clientY - rect.top - state.drag.offsetY) / grid) * grid);
      renderNodes();
      renderEdges();
    });

    window.addEventListener('pointerup', () => {
      if (state.drag) {
        state.drag = null;
        renderPanels();
      }
    });

    function selectItem(item) {
      state.selected = item;
      renderAll();
    }

    canvasWrap.addEventListener('dragover', ev => {
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'copy';
    });

    canvasWrap.addEventListener('drop', ev => {
      ev.preventDefault();
      const partId = ev.dataTransfer.getData('text/plain');
      if (!partId) return;
      const rect = canvasWrap.getBoundingClientRect();
      addNode(partId, Math.max(12, ev.clientX - rect.left - NODE_WIDTH / 2), Math.max(76, ev.clientY - rect.top - NODE_MIN_HEIGHT / 2));
    });

    canvasWrap.addEventListener('click', ev => {
      if (ev.target === canvasWrap || ev.target === nodeLayer || ev.target === edgeLayer) {
        state.selected = null;
        state.pendingPort = null;
        renderAll();
      }
    });

    function deleteSelected() {
      if (!state.selected) return toast('Nothing selected.');
      if (state.selected.type === 'node') {
        const id = state.selected.id;
        state.nodes = state.nodes.filter(n => n.id !== id);
        state.edges = state.edges.filter(e => e.from.nodeId !== id && e.to.nodeId !== id);
      } else if (state.selected.type === 'edge') {
        state.edges = state.edges.filter(e => e.id !== state.selected.id);
      }
      state.selected = null;
      renderAll();
    }

    window.addEventListener('keydown', ev => {
      if (ev.key === 'Delete' || ev.key === 'Backspace') {
        const tag = document.activeElement?.tagName?.toLowerCase();
        if (['input','textarea','select'].includes(tag)) return;
        deleteSelected();
      }
      if (ev.key === 'Escape') {
        state.pendingPort = null;
        state.selected = null;
        renderAll();
      }
    });

    function getBOM() {
      const map = new Map();
      state.nodes.forEach(node => {
        const part = getNodePart(node);
        const key = part.id;
        if (!map.has(key)) {
          map.set(key, { name: part.name, partNumber: part.partNumber, manufacturer: part.manufacturer, qty: 0, lengthFt: 0, isTubing: part.category === 'Tubing' });
        }
        const item = map.get(key);
        item.qty += 1;
        if (item.isTubing) item.lengthFt += Number(node.lengthFt || 0);
      });
      return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
    }

    function getConnectionSteps() {
      return state.edges.map((edge, i) => {
        const fromNode = getNode(edge.from.nodeId);
        const toNode = getNode(edge.to.nodeId);
        const fromPort = getPort(edge.from.nodeId, edge.from.portId);
        const toPort = getPort(edge.to.nodeId, edge.to.portId);
        const v = validateConnection(edge.from, edge.to);
        return {
          index: i + 1,
          title: `${fromNode?.label || ''} → ${toNode?.label || ''}`,
          detail: `${fromPort?.label || ''} connects to ${toPort?.label || ''}. ${v.messages.join(' ')}`,
          status: v.status,
          statusTitle: v.title
        };
      });
    }

    function saveAssembly() {
      const payload = exportState();
      localStorage.setItem('connection-master-v2', JSON.stringify(payload));
      toast('Assembly saved to this browser.');
    }

    function loadAssembly() {
      const raw = localStorage.getItem('connection-master-v2') || localStorage.getItem('connection-master-v1');
      if (!raw) return toast('No saved assembly found in this browser.');
      importState(JSON.parse(raw));
      toast('Assembly loaded.');
    }

    function exportState() {
      return {
        app: 'Connection Master',
        version: '2.0',
        exportedAt: new Date().toISOString(),
        gas: state.gas,
        service: state.service,
        pressure: state.pressure,
        nodeSeq: state.nodeSeq,
        edgeSeq: state.edgeSeq,
        nodes: state.nodes,
        edges: state.edges.map(e => ({ id: e.id, from: e.from, to: e.to }))
      };
    }

    function importState(payload) {
      state.gas = payload.gas || 'Helium';
      state.service = payload.service || 'Carrier Gas';
      state.pressure = payload.pressure || 100;
      state.nodeSeq = payload.nodeSeq || 1;
      state.edgeSeq = payload.edgeSeq || 1;
      state.nodes = payload.nodes || [];
      state.edges = payload.edges || [];
      state.selected = null;
      state.pendingPort = null;
      gasSelect.value = state.gas;
      serviceSelect.value = state.service;
      pressureInput.value = state.pressure;
      renderAll();
    }

    function downloadJSON() {
      const blob = new Blob([JSON.stringify(exportState(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `connection-master-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function loadSampleBuild() {
      state.nodes = [];
      state.edges = [];
      state.selected = null;
      state.pendingPort = null;
      state.nodeSeq = 1;
      state.edgeSeq = 1;
      state.gas = 'Helium';
      state.service = 'Carrier Gas';
      state.pressure = 100;
      gasSelect.value = state.gas;
      serviceSelect.value = state.service;
      pressureInput.value = state.pressure;

      const n1 = addNode('source-he-cyl', 80, 160, { label: 'Helium Cylinder' });
      const n2 = addNode('reg-2stage-cga580', 330, 160, { label: 'Two-Stage Regulator' });
      const n3 = addNode('adapter-nptm-to-tube14', 580, 160, { label: 'Regulator Outlet Adapter' });
      const n4 = addNode('tube-ss-14', 830, 160, { label: '1/4 in SS Tubing', lengthFt: 4 });
      const n5 = addNode('valve-shutoff-14', 1080, 160, { label: 'Carrier Shutoff Valve' });
      const n6 = addNode('reducer-14-18', 1080, 330, { label: '1/4 to 1/8 Reducer' });
      const n7 = addNode('tube-ss-18', 830, 330, { label: '1/8 in SS Tubing', lengthFt: 6 });
      const n8 = addNode('trap-moisture-18', 580, 330, { label: 'Moisture Trap' });
      const n9 = addNode('tube-ss-18', 330, 330, { label: 'Final 1/8 in SS Tubing', lengthFt: 3 });
      const n10 = addNode('gc-carrier-inlet-18', 80, 330, { label: 'GC Carrier Inlet' });

      // Create a routed assembly. Some edges intentionally follow visual path, not flow sequence.
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n1.id, portId: 'out' }, to: { nodeId: n2.id, portId: 'in' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n2.id, portId: 'out' }, to: { nodeId: n3.id, portId: 'npt' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n3.id, portId: 'tube' }, to: { nodeId: n4.id, portId: 'a' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n4.id, portId: 'b' }, to: { nodeId: n5.id, portId: 'in' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n5.id, portId: 'out' }, to: { nodeId: n6.id, portId: 'large' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n6.id, portId: 'small' }, to: { nodeId: n7.id, portId: 'b' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n7.id, portId: 'a' }, to: { nodeId: n8.id, portId: 'out' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n8.id, portId: 'in' }, to: { nodeId: n9.id, portId: 'b' } });
      state.edges.push({ id: `E${state.edgeSeq++}`, from: { nodeId: n9.id, portId: 'a' }, to: { nodeId: n10.id, portId: 'in' } });
      renderAll();
      toast('Sample carrier gas build loaded.');
    }

    function generateReport() {
      const bom = getBOM();
      const steps = getConnectionSteps();
      const issues = getAllIssues();
      const date = new Date().toLocaleString();
      const status = issues.some(i => i.status === 'invalid') ? 'BLOCKED - DO NOT BUILD UNTIL RESOLVED' : issues.some(i => i.status === 'warn') ? 'REVIEW REQUIRED' : 'VALID DRAFT - VERIFY PHYSICALLY BEFORE USE';

      document.getElementById('reportBody').innerHTML = `
        <h2>Connection Master Build Sheet</h2>
        <p><strong>Status:</strong> ${escapeHtml(status)}</p>
        <p><strong>Generated:</strong> ${escapeHtml(date)}<br>
        <strong>Gas:</strong> ${escapeHtml(state.gas)} &nbsp; <strong>Service:</strong> ${escapeHtml(state.service)} &nbsp; <strong>Pressure:</strong> ${escapeHtml(String(state.pressure))} psig</p>

        <h3>Assembly Summary</h3>
        <table>
          <tr><th>Total Parts</th><td>${state.nodes.length}</td></tr>
          <tr><th>Total Connections</th><td>${state.edges.length}</td></tr>
          <tr><th>Validation Issues</th><td>${issues.length}</td></tr>
        </table>

        <h3>Bill of Materials</h3>
        <table>
          <thead><tr><th>Qty</th><th>Part</th><th>Part #</th><th>Manufacturer</th><th>Notes</th></tr></thead>
          <tbody>${bom.map(item => `<tr><td>${item.qty}${item.lengthFt ? `<br>${item.lengthFt} ft total` : ''}</td><td>${escapeHtml(item.name)}</td><td><code>${escapeHtml(item.partNumber)}</code></td><td>${escapeHtml(item.manufacturer)}</td><td>${item.lengthFt ? 'Tubing length from drawing. Verify actual routing length before cutting.' : ''}</td></tr>`).join('')}</tbody>
        </table>

        <h3>Connection-by-Connection Build Steps</h3>
        <table>
          <thead><tr><th>Step</th><th>Connection</th><th>Verification</th><th>Status</th></tr></thead>
          <tbody>${steps.map(s => `<tr><td>${s.index}</td><td>${escapeHtml(s.title)}</td><td>${escapeHtml(s.detail)}</td><td>${escapeHtml(s.statusTitle)}</td></tr>`).join('')}</tbody>
        </table>

        <h3>Validation Warnings / Blocks</h3>
        ${issues.length ? `<table><thead><tr><th>Severity</th><th>Issue</th><th>Detail</th></tr></thead><tbody>${issues.map(i => `<tr><td>${escapeHtml(i.status.toUpperCase())}</td><td>${escapeHtml(i.title)}</td><td>${escapeHtml(i.message)}</td></tr>`).join('')}</tbody></table>` : '<p>No automated validation issues detected.</p>'}

        <h3>Required Physical Checks</h3>
        <table>
          <tbody>
            <tr><td>□</td><td>Verify all part numbers against approved SPL part library before assembly.</td></tr>
            <tr><td>□</td><td>Confirm gas cylinder/source label and regulator CGA connection.</td></tr>
            <tr><td>□</td><td>Inspect tubing cuts: square, deburred, clean, and correct OD.</td></tr>
            <tr><td>□</td><td>Verify ferrule orientation and tube insertion depth for compression fittings.</td></tr>
            <tr><td>□</td><td>Apply approved NPT sealant only where required. Keep sealant out of flow path.</td></tr>
            <tr><td>□</td><td>Pressurize slowly and leak-check every connection.</td></tr>
            <tr><td>□</td><td>Record final pressure and leak-check result.</td></tr>
            <tr><td>□</td><td>Attach final assembly photo to controlled record.</td></tr>
          </tbody>
        </table>

        <h3>Signoff</h3>
        <table>
          <tr><th>Built By</th><td style="height:38px"></td><th>Date</th><td></td></tr>
          <tr><th>Leak Checked By</th><td style="height:38px"></td><th>Date</th><td></td></tr>
          <tr><th>Reviewed By</th><td style="height:38px"></td><th>Date</th><td></td></tr>
        </table>

        <p><em>This prototype assists assembly planning only. Final use requires approved procedures, vendor specifications, physical inspection, and leak testing.</em></p>
      `;
      document.getElementById('reportModal').classList.add('open');
    }

    function clearCanvas() {
      if (!confirm('Clear the current assembly?')) return;
      state.nodes = [];
      state.edges = [];
      state.selected = null;
      state.pendingPort = null;
      renderAll();
      toast('Canvas cleared.');
    }

    function statusPill(status, text) {
      const cls = status === 'valid' ? 'status-valid' : status === 'warn' ? 'status-warn' : status === 'invalid' ? 'status-invalid' : 'status-draft';
      return `<span class="status-pill ${cls}">${escapeHtml(text)}</span>`;
    }

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(toastEl._timer);
      toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/`/g, '&#96;');
    }

    toolSearchEl.addEventListener('input', renderToolbox);
    gasSelect.addEventListener('change', () => { state.gas = gasSelect.value; renderAll(); });
    serviceSelect.addEventListener('change', () => { state.service = serviceSelect.value; renderAll(); });
    pressureInput.addEventListener('input', () => { state.pressure = Number(pressureInput.value || 0); renderAll(); });

    document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
    document.getElementById('clearBtn').addEventListener('click', clearCanvas);
    document.getElementById('sampleBtn').addEventListener('click', loadSampleBuild);
    document.getElementById('saveBtn').addEventListener('click', saveAssembly);
    document.getElementById('loadBtn').addEventListener('click', loadAssembly);
    document.getElementById('exportBtn').addEventListener('click', downloadJSON);
    document.getElementById('reportBtn').addEventListener('click', generateReport);
    document.getElementById('closeReportBtn').addEventListener('click', () => document.getElementById('reportModal').classList.remove('open'));
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    window.addEventListener('resize', renderEdges);

    renderToolbox();
    renderAll();
  </script>
</body>
</html>
